<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оплата курса - ПДД Шпаргалки</title>
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e9ecf2 100%);
            margin: 0;
            padding: 40px 20px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .payment-container {
            max-width: 600px;
            width: 100%;
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(10, 37, 64, 0.15);
            overflow: hidden;
            padding: 30px;
        }
        
        .payment-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .payment-header h2 {
            color: #0a2540;
            font-weight: 800;
            font-size: 2rem;
            margin-bottom: 10px;
        }
        
        .payment-header p {
            color: #4a5a6a;
            font-size: 1rem;
        }
        
        .product-info {
            background: #f8faff;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 25px;
            border: 1px solid rgba(10, 37, 64, 0.05);
        }
        
        .product-name {
            font-weight: 700;
            color: #0a2540;
            margin-bottom: 5px;
            font-size: 1.2rem;
        }
        
        .product-price {
            font-weight: 800;
            color: #ff6b4a;
            font-size: 1.8rem;
        }
        
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #4a5a6a;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s ease;
        }
        
        .back-link:hover {
            color: #ff6b4a;
        }
        
        /* Скрытое поле для передачи данных */
        .ym-hidden-inputs input[name="shopSuccessURL"] {
            display: block;
        }
    </style>
    
    <!-- Подключаем стили ЮKassa -->
    <link rel="stylesheet" href="https://yookassa.ru/integration/simplepay/css/yookassa_construct_form.css?v=1.33.0">
</head>
<body>
    <div class="payment-container">
        <div class="payment-header">
            <h2>ПДД Шпаргалки</h2>
            <p>Оплата курсов с глубоким разбором</p>
        </div>
        
        <div class="product-info" id="productInfo">
            <!-- Заполняется скриптом -->
        </div>

        <!-- Форма оплаты ЮKassa (v1.33.0) - ПОЛНОСТЬЮ ОРИГИНАЛЬНАЯ -->
        <form target="_blank" class="yoomoney-payment-form" action="https://yookassa.ru/integration/simplepay/payment" method="post" accept-charset="utf-8">
            
            <div class="ym-customer-info">
                <div class="ym-block-title">О покупателе</div>
                <input name="cps_email" class="ym-input" placeholder="Email" type="text" value="" required>
            </div>

            <div class="ym-hidden-inputs">
                <input name="shopSuccessURL" type="hidden" value="https://pdd-shpargalka.ru/course-success.html">
            </div>
            
            <div class="ym-payment-btn-block ym-before-line ym-align-space-between">
                <div class="ym-input-icon-rub ym-display-none">
                    <input name="sum" placeholder="0.00" class="ym-input ym-sum-input ym-required-input" type="number" step="any" value="299" id="paymentSum">
                </div>
                <button data-text="Заплатить" class="ym-btn-pay ym-result-price">
                    <span class="ym-text-crop">Заплатить</span> 
                    <span class="ym-price-output" id="priceOutput">299,00&nbsp;₽</span>
                </button>
                <img src="https://yookassa.ru/integration/simplepay/img/iokassa-gray.svg?v=1.33.0" class="ym-logo" width="114" height="27" alt="ЮKassa">
            </div>
            
            <input name="shopId" type="hidden" value="1194993">
        </form>
        
        <!-- Подключаем скрипт ЮKassa -->
        <script src="https://yookassa.ru/integration/simplepay/js/yookassa_construct_form.js?v=1.33.0"></script>

        <a href="index.html" class="back-link">← Вернуться на главную</a>
    </div>

    <!-- Скрипт для управления курсами (БЕЗ ИЗМЕНЕНИЙ ФОРМЫ) -->
    <script>
        // Названия курсов и цены
        const courses = {
            'obgon': { name: 'Курс: Обгон и опережение', price: 299 },
            'stop': { name: 'Курс: Остановка и стоянка', price: 299 }
        };

        // Получаем параметры из URL
        const urlParams = new URLSearchParams(window.location.search);
        let courseId = urlParams.get('course') || 'obgon';
        
        // Проверяем, что курс существует
        if (!courses[courseId]) {
            courseId = 'obgon';
        }
        
        const course = courses[courseId];
        
        // Получаем информацию о партнере из cookies
        function getPartnerFromCookies() {
            const cookies = document.cookie.split('; ');
            for (let cookie of cookies) {
                if (cookie.startsWith('partner=')) {
                    try {
                        return JSON.parse(decodeURIComponent(cookie.substring(8)));
                    } catch(e) {
                        return null;
                    }
                }
            }
            return null;
        }
        
        // Сохраняем ID курса для course-success.html
        localStorage.setItem('last_paid_course', courseId);
        
        // Если есть партнер, сохраняем информацию
        const partner = getPartnerFromCookies();
        if (partner) {
            localStorage.setItem('last_partner_ref', partner.ref);
            console.log('✅ Партнер сохранен в localStorage:', partner.ref);
        }
        
        // Обновляем информацию о курсе на странице
        const productInfo = document.getElementById('productInfo');
        productInfo.innerHTML = `
            <div class="product-name">${course.name}</div>
            <div class="product-price">${course.price} ₽</div>
        `;
        
        // Обновляем сумму в форме
        document.getElementById('paymentSum').value = course.price;
        document.getElementById('priceOutput').innerHTML = `${course.price},00&nbsp;₽`;
        
        console.log('✅ Страница оплаты курса готова. Курс:', courseId, 'Цена:', course.price);
    </script>
</body>
</html>
