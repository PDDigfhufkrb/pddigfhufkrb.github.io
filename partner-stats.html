<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Статистика партнеров | ПДД Шпаргалки</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: #f5f7fa;
            padding: 40px 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            color: #0a2540;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #4a5a6a;
            margin-bottom: 40px;
            font-size: 1.1rem;
        }
        
        .login-section {
            max-width: 400px;
            margin: 100px auto;
            background: white;
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(10, 37, 64, 0.15);
            text-align: center;
        }
        
        .login-section h2 {
            color: #0a2540;
            font-weight: 800;
            margin-bottom: 20px;
        }
        
        .login-section input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e7ff;
            border-radius: 12px;
            font-size: 1rem;
            margin-bottom: 20px;
            transition: border-color 0.3s ease;
        }
        
        .login-section input:focus {
            outline: none;
            border-color: #ff6b4a;
        }
        
        .login-section button {
            background: linear-gradient(135deg, #0a2540, #1a3b5c);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
        }
        
        .login-section button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(10, 37, 64, 0.2);
        }
        
        .error-message {
            color: #ff6b4a;
            margin-top: 10px;
            font-size: 0.9rem;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: white;
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            border: 1px solid rgba(10,37,64,0.05);
        }
        
        .stat-card h3 {
            color: #4a5a6a;
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
        }
        
        .stat-number {
            font-size: 2.2rem;
            font-weight: 800;
            color: #0a2540;
        }
        
        .stat-label {
            color: #ff6b4a;
            font-weight: 600;
            margin-top: 5px;
        }
        
        .partner-badge {
            background: #e8f0fe;
            color: #0a2540;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }
        
        .table-container {
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            overflow-x: auto;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th {
            text-align: left;
            padding: 15px 10px;
            background: #f8faff;
            color: #0a2540;
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        td {
            padding: 12px 10px;
            border-bottom: 1px solid rgba(10,37,64,0.05);
            color: #1a2b3c;
        }
        
        .amount {
            font-weight: 700;
            color: #0a2540;
        }
        
        .partner-share {
            color: #ff6b4a;
            font-weight: 700;
        }
        
        .logout-btn {
            background: #0a2540;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }
        
        .logout-btn:hover {
            background: #1a3b5c;
        }
        
        .export-btn {
            background: #0a2540;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }
        
        .export-btn:hover {
            background: #1a3b5c;
            transform: translateY(-2px);
        }
        
        .partner-info {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(10,37,64,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .partner-name {
            font-weight: 800;
            font-size: 1.3rem;
            color: #0a2540;
        }
        
        .partner-link {
            background: #f1f5f9;
            padding: 8px 15px;
            border-radius: 8px;
            font-size: 0.9rem;
            color: #4a5a6a;
        }
        
        .footer {
            margin-top: 40px;
            color: #4a5a6a;
            font-size: 0.9rem;
            text-align: center;
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Заголовок -->
        <div id="mainHeader">
            <h1>📊 Статистика партнеров</h1>
            <p class="subtitle">Введите код доступа для просмотра статистики</p>
        </div>
        
        <!-- Форма входа -->
        <div class="login-section" id="loginForm">
            <h2>Доступ к статистике</h2>
            <input type="text" id="partnerCode" placeholder="Код доступа (например: doroga-pdd)" autocomplete="off">
            <button onclick="login()">Войти</button>
            <div class="error-message" id="loginError"></div>
        </div>
        
        <!-- Статистика (скрыта до входа) -->
        <div id="statsContent" class="hidden">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <button class="logout-btn" onclick="logout()">← Выйти</button>
                <div id="currentPartnerName" class="partner-name"></div>
            </div>
            
            <div class="partner-info">
                <div>
                    <div class="partner-name" id="displayPartnerName"></div>
                    <div class="partner-link" id="displayPartnerLink"></div>
                </div>
                <button class="export-btn" onclick="exportToCSV()">⬇️ Экспорт в CSV</button>
            </div>
            
            <div class="stats-grid" id="statsGrid"></div>
            
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Дата</th>
                            <th>Товар</th>
                            <th>Сумма</th>
                            <th>Ваша доля (40%)</th>
                        </tr>
                    </thead>
                    <tbody id="salesTable"></tbody>
                </table>
            </div>
        </div>
        
        <div class="footer">
            <p>Данные обновляются автоматически при каждой продаже.</p>
        </div>
    </div>
    
    <script>
        // Список партнеров и их коды доступа
        const partners = {
            'pddpravila': {
                name: 'ПДД | Правила Дорожного Движения',
                ref: 'pddpravila',
                link: 'https://pdd-shpargalka.ru/?ref=pddpravila'
            },
            'pro-pdd': {
                name: 'PRO ПДД',
                ref: 'pro-pdd',
                link: 'https://pdd-shpargalka.ru/?ref=pro-pdd'
            },
            'doroga-pdd': {
                name: 'ДОРОГА - ПДД',
                ref: 'doroga-pdd',
                link: 'https://pdd-shpargalka.ru/?ref=doroga-pdd'
            },
            'uroki-pdd': {
                name: 'Уроки ПДД',
                ref: 'uroki-pdd',
                link: 'https://pdd-shpargalka.ru/?ref=uroki-pdd'
            },
            'lobnya': {
                name: 'Лобненский маршрут ГАИ',
                ref: 'lobnya',
                link: 'https://pdd-shpargalka.ru/?ref=lobnya'
            }
        };
        
        let currentPartner = null;
        
        // Вход в систему
        function login() {
            const code = document.getElementById('partnerCode').value.trim();
            const errorDiv = document.getElementById('loginError');
            
            if (partners[code]) {
                currentPartner = partners[code];
                localStorage.setItem('partnerStatsAccess', code);
                showStats();
                errorDiv.innerHTML = '';
            } else {
                errorDiv.innerHTML = 'Неверный код доступа';
            }
        }
        
        // Выход
        function logout() {
            currentPartner = null;
            localStorage.removeItem('partnerStatsAccess');
            document.getElementById('loginForm').classList.remove('hidden');
            document.getElementById('statsContent').classList.add('hidden');
            document.getElementById('mainHeader').classList.remove('hidden');
        }
        
        // Показать статистику
        function showStats() {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('statsContent').classList.remove('hidden');
            document.getElementById('mainHeader').classList.add('hidden');
            
            document.getElementById('displayPartnerName').innerHTML = currentPartner.name;
            document.getElementById('displayPartnerLink').innerHTML = `Ваша ссылка: ${currentPartner.link}`;
            
            loadStats();
        }
        
        // Загрузка статистики
        function loadStats() {
            if (!currentPartner) return;
            
            const allSales = JSON.parse(localStorage.getItem('partnerSales') || '[]');
            
            // Фильтруем только продажи этого партнера
            const partnerSales = allSales.filter(sale => sale.partner === currentPartner.ref);
            
            // Общая статистика
            const totalSales = partnerSales.length;
            const totalRevenue = partnerSales.reduce((sum, s) => sum + s.price, 0);
            const totalPartnerShare = totalRevenue * 0.4;
            
            // Считаем по товарам
            const products = {};
            partnerSales.forEach(sale => {
                const productName = sale.product_name || 'Шпаргалка';
                if (!products[productName]) {
                    products[productName] = {
                        count: 0,
                        revenue: 0
                    };
                }
                products[productName].count++;
                products[productName].revenue += sale.price;
            });
            
            // Формируем статистику
            let statsHtml = `
                <div class="stat-card">
                    <h3>Всего продаж</h3>
                    <div class="stat-number">${totalSales}</div>
                    <div class="stat-label">шт.</div>
                </div>
                <div class="stat-card">
                    <h3>Общая выручка</h3>
                    <div class="stat-number">${totalRevenue} ₽</div>
                    <div class="stat-label">до выплат</div>
                </div>
                <div class="stat-card">
                    <h3>Ваша доля (40%)</h3>
                    <div class="stat-number">${Math.round(totalPartnerShare)} ₽</div>
                    <div class="stat-label">к выплате</div>
                </div>
            `;
            
            // Добавляем статистику по товарам
            for (let [product, data] of Object.entries(products)) {
                statsHtml += `
                    <div class="stat-card">
                        <h3>${product}</h3>
                        <div class="stat-number">${data.count}</div>
                        <div class="stat-label">продаж / ${data.revenue} ₽</div>
                    </div>
                `;
            }
            
            document.getElementById('statsGrid').innerHTML = statsHtml;
            
            // Таблица продаж
            let tableHtml = '';
            partnerSales.sort((a, b) => new Date(b.date) - new Date(a.date)).forEach(sale => {
                const date = new Date(sale.date).toLocaleString('ru-RU');
                const partnerShare = sale.price * 0.4;
                tableHtml += `
                    <tr>
                        <td>${date}</td>
                        <td>${sale.product_name || sale.product || 'Шпаргалка'}</td>
                        <td class="amount">${sale.price} ₽</td>
                        <td class="partner-share">${Math.round(partnerShare)} ₽</td>
                    </tr>
                `;
            });
            
            if (partnerSales.length === 0) {
                tableHtml = '<tr><td colspan="4" class="text-center py-4">У вас пока нет продаж</td></tr>';
            }
            
            document.getElementById('salesTable').innerHTML = tableHtml;
        }
        
        // Экспорт в CSV
        function exportToCSV() {
            if (!currentPartner) return;
            
            const allSales = JSON.parse(localStorage.getItem('partnerSales') || '[]');
            const partnerSales = allSales.filter(sale => sale.partner === currentPartner.ref);
            
            if (partnerSales.length === 0) {
                alert('Нет данных для экспорта');
                return;
            }
            
            let csv = 'Дата,Товар,Сумма,Доля партнера (40%)\n';
            
            partnerSales.forEach(sale => {
                const date = new Date(sale.date).toLocaleString('ru-RU');
                const partnerShare = sale.price * 0.4;
                csv += `"${date}",${sale.product_name || sale.product},${sale.price},${Math.round(partnerShare)}\n`;
            });
            
            const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `sales_${currentPartner.ref}_${new Date().toISOString().slice(0,10)}.csv`;
            link.click();
        }
        
        // Автоматический вход, если уже есть сохраненный код
        document.addEventListener('DOMContentLoaded', function() {
            const savedCode = localStorage.getItem('partnerStatsAccess');
            if (savedCode && partners[savedCode]) {
                currentPartner = partners[savedCode];
                showStats();
            }
        });
    </script>
</body>
</html>
